<!DOCTYPE html><html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemeinschaftskonto Rechner</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:white;padding:30px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.1);width:350px}
h1{font-size:20px;margin-bottom:20px}
label{display:block;margin-top:10px;font-weight:bold}
input{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:1px solid #ccc}
button{margin-top:20px;width:100%;padding:10px;border:none;border-radius:8px;background:#4f46e5;color:white;font-weight:bold;cursor:pointer}
button:hover{opacity:0.9}
.result{margin-top:20px;padding:10px;background:#f1f5f9;border-radius:8px}
</style>
</head>
<body><div class="card">
<h1>Gemeinschaftskonto Rechner</h1><label>Dein Nettolohn (€)</label> <input id="income1" type="number" value="1500">

<label>Nettolohn Partner (€)</label> <input id="income2" type="number" value="1500">

<label>Monatlicher Betrag fürs Konto (€)</label> <input id="total" type="number" value="2500">

<button onclick="calculate()">Berechnen</button>

<div class="result" id="result" style="display:none"></div>
</div><script>
function calculate(){
 const income1=parseFloat(document.getElementById('income1').value);
 const income2=parseFloat(document.getElementById('income2').value);
 const total=parseFloat(document.getElementById('total').value);

 if(!income1||!income2||!total){
  alert('Bitte alle Werte eingeben');
  return;
 }

 const combined=income1+income2;
 const percentage=total/combined;

 const contribution1=income1*percentage;
 const contribution2=income2*percentage;

 const resultDiv=document.getElementById('result');
 resultDiv.style.display='block';
 resultDiv.innerHTML=`
 <strong>Gemeinsamer Prozentsatz:</strong> ${(percentage*100).toFixed(2)} %<br><br>
 <strong>Dein Beitrag:</strong> ${contribution1.toFixed(2)} €<br>
 <strong>Beitrag Partner:</strong> ${contribution2.toFixed(2)} €
 `;
}
</script></body>
</html>
